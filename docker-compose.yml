version: '3.8'

# Standalone Docker Compose for Chege Jira WebApp
# Usage: docker compose up --build -d
# This will spin up the webapp, MySQL, and phpMyAdmin.

services:
  mysql:
    image: mysql:8.4
    container_name: shared-mysql
    ports:
      - "9306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_chege_jira
    command: --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - shared-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shared-phpmyadmin
    ports:
      - "9000:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared-network

  chege-jira:
    build:
      context: .
      dockerfile: Dockerfile
    image: chege-jira-webapp:latest
    container_name: chege-jira-webapp
    ports:
      - "9001:80"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shared-network

volumes:
  mysql-data:

networks:
  shared-network:
    name: hosts-shared-network
